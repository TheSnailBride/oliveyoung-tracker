spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oliveyoung_tracker?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: ${REDIS_CACHE_TTL:5m}
      cache-null-values: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ${JWT_SECRET:your-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000  # 24시간 (ms)

kakao:
  client-id: ${KAKAO_CLIENT_ID:your_kakao_client_id}
  client-secret: ${KAKAO_CLIENT_SECRET:}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/kakao/callback}

crawler:
  internal-token: ${CRAWLER_INTERNAL_TOKEN:}
  schedule:
    cron: ${CRAWLER_SCHEDULE_CRON:0 0 3 * * *}
    zone: ${CRAWLER_SCHEDULE_ZONE:Asia/Seoul}
  lock:
    ttl: ${CRAWLER_LOCK_TTL:5m}
    redis:
      key: ${CRAWLER_LOCK_REDIS_KEY:lock:crawler:manual-run}

product:
  maintenance:
    cron: ${PRODUCT_MAINTENANCE_CRON:0 30 3 * * *}
    zone: ${PRODUCT_MAINTENANCE_ZONE:Asia/Seoul}

server:
  port: ${SERVER_PORT:8080}
