spring:
  datasource:
    url: jdbc:mysql://localhost:3306/oliveyoung_tracker?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:your_db_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: ${JWT_SECRET:your_jwt_secret_key_must_be_at_least_256_bits}
  expiration: 86400000  # 24시간 (ms)

kakao:
  client-id: ${KAKAO_CLIENT_ID:your_kakao_client_id}
  client-secret: ${KAKAO_CLIENT_SECRET:your_kakao_client_secret}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/api/kakao/callback}

crawler:
  schedule:
    cron: "0 0 */12 * * *"

server:
  port: ${SERVER_PORT:8080}

